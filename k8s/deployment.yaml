apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-mgt
  namespace: default
  labels:
    app: jenkins-mgt
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "5000"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-mgt
  template:
    metadata:
      labels:
        app: jenkins-mgt
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
      - name: jenkins-mgt
        # Update this to your image: e.g. your-registry.example.com/jenkins-mgt:latest
        image: your-registry.example.com/jenkins-mgt:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: FLASK_ENV
          value: "production"
        - name: FLASK_APP
          value: "app.py"
        volumeMounts:
        - name: config-volume
          mountPath: /app/jobs_config.yaml
          subPath: jobs_config.yaml
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: jenkins-mgt-config
          items:
          - key: jobs_config.yaml
            path: jobs_config.yaml 